<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>REX — Repository Engineering eXpert</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
  <!-- Prism VS Code Dark+ syntax theme -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prism-themes@1.9.0/themes/prism-vsc-dark-plus.css" />
</head>
<body>

  <!-- ── Sidebar ─────────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo-row">
        <span id="rex-icon-slot" aria-hidden="true"></span>
        <span class="logo">REX</span>
      </div>
      <span class="logo-sub">Repository Engineering eXpert</span>
    </div>

    <div class="sidebar-section">
      <label class="field-label">Project</label>
      <div class="project-dropdown" id="project-dropdown">
        <input
          id="project-name"
          class="field-input"
          type="text"
          placeholder="e.g. insurance-platform"
          autocomplete="off"
        />
        <ul class="project-suggestions" id="project-suggestions" hidden></ul>
      </div>
    </div>

    <div class="sidebar-section">
      <label class="field-label">Index a new project</label>
      <input
        id="project-path"
        class="field-input"
        type="text"
        placeholder="C:\tom\repos\my-project"
      />
      <button id="ingest-btn" class="btn-ingest" onclick="ingestProject()">
        Index Project
      </button>
      <div id="ingest-status" class="status-msg"></div>
    </div>

    <div class="sidebar-section">
      <label class="field-label">Model</label>
      <div class="model-toggle">
        <button id="btn-code" class="model-btn active" onclick="setModel('code')">
          Code
        </button>
        <button id="btn-reasoning" class="model-btn" onclick="setModel('reasoning')">
          Reasoning
        </button>
      </div>
      <span id="model-label" class="model-label">codellama</span>
    </div>

    <div class="sidebar-section">
      <label class="field-label">Results per query</label>
      <div class="slider-row">
        <input type="range" id="n-results" min="1" max="10" value="5"
               oninput="document.getElementById('n-results-val').textContent = this.value"/>
        <span id="n-results-val" class="slider-val">5</span>
      </div>
    </div>

    <div class="sidebar-section">
      <label class="field-label">Accent Colour</label>
      <div class="colour-row">
        <input type="color" id="accent-picker" value="#c8ff00" oninput="updateAccent(this.value)" />
        <div class="colour-swatches">
          <span class="swatch" title="Volt"     style="background:#c8ff00" onclick="updateAccent('#c8ff00')"></span>
          <span class="swatch" title="Cyan"     style="background:#00d4ff" onclick="updateAccent('#00d4ff')"></span>
          <span class="swatch" title="Mint"     style="background:#00ff9f" onclick="updateAccent('#00ff9f')"></span>
          <span class="swatch" title="Orange"   style="background:#ff6b35" onclick="updateAccent('#ff6b35')"></span>
          <span class="swatch" title="Violet"   style="background:#b06aff" onclick="updateAccent('#b06aff')"></span>
          <span class="swatch" title="Rose"     style="background:#ff4d8f" onclick="updateAccent('#ff4d8f')"></span>
        </div>
      </div>
      <div class="dim-preview">
        <span class="dim-swatch" id="dim-swatch"></span>
        <span class="dim-hex" id="dim-hex"></span>
      </div>
    </div>

    <div class="sidebar-footer">
      <button class="btn-clear" onclick="clearSession()">New Session</button>
      <div id="server-status" class="server-status">Connecting...</div>
    </div>
  </aside>

  <!-- ── Main chat area ──────────────────────────────────── -->
  <main class="main">
    <div id="chat-window" class="chat-window">
      <div class="welcome">
        <div class="welcome-title">Ready to explore your codebase.</div>
        <div class="welcome-sub">Set a project name on the left, then start asking.</div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-row">
        <textarea
          id="question-input"
          class="question-input"
          placeholder="Ask anything about your codebase..."
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button class="btn-send" onclick="sendQuery()" id="send-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </main>

  <!-- marked.js — markdown parser -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <!-- Prism core — bundles markup (HTML), CSS, clike, JavaScript -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <!-- Additional language grammars -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-typescript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-sql.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>

  <script>
  const API = "http://127.0.0.1:8000";
  let sessionId      = crypto.randomUUID();
  let currentModel   = "codellama";
  let isLoading      = false;
  let rexSpriteReady = false;

  // ── Rex SVG sprite ───────────────────────────────────
  async function initRexSprite() {
    try {
      const res  = await fetch('images/rex_logo.svg');
      const text = await res.text();
      const parser = new DOMParser();
      const svgDoc = parser.parseFromString(text, 'image/svg+xml');
      const paths  = Array.from(svgDoc.querySelectorAll('path'));

      // Measure total path length using a temporary off-screen SVG
      const measurer = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      measurer.style.cssText = 'position:absolute;visibility:hidden;pointer-events:none;width:0;height:0';
      document.body.appendChild(measurer);
      let totalLength = 0;
      paths.forEach(p => {
        const clone = p.cloneNode(true);
        measurer.appendChild(clone);
        try { totalLength += clone.getTotalLength(); } catch(e) {}
        measurer.removeChild(clone);
      });
      document.body.removeChild(measurer);
      const dashLen = Math.ceil(totalLength) + 500;
      document.documentElement.style.setProperty('--rex-dash-length', String(dashLen));

      // Build hidden sprite with two symbols
      const sprite = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      sprite.style.display = 'none';
      sprite.setAttribute('aria-hidden', 'true');
      const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');

      // Solid fill symbol (sidebar icon)
      const symFill = document.createElementNS('http://www.w3.org/2000/svg', 'symbol');
      symFill.setAttribute('id', 'rex-skull');
      symFill.setAttribute('viewBox', '0 0 752 576');
      paths.forEach(p => {
        const clone = p.cloneNode(true);
        clone.setAttribute('fill', 'currentColor');
        clone.removeAttribute('opacity');
        clone.removeAttribute('stroke');
        symFill.appendChild(clone);
      });

      // Outline/stroke symbol (loader animation)
      const symOutline = document.createElementNS('http://www.w3.org/2000/svg', 'symbol');
      symOutline.setAttribute('id', 'rex-skull-outline');
      symOutline.setAttribute('viewBox', '0 0 752 576');
      paths.forEach(p => {
        const clone = p.cloneNode(true);
        clone.setAttribute('fill', 'none');
        clone.setAttribute('stroke', 'currentColor');
        clone.setAttribute('stroke-width', '15');
        clone.setAttribute('stroke-linejoin', 'miter');
        clone.setAttribute('stroke-linecap', 'butt');
        symOutline.appendChild(clone);
      });

      defs.appendChild(symFill);
      defs.appendChild(symOutline);
      sprite.appendChild(defs);
      document.body.insertBefore(sprite, document.body.firstChild);

      rexSpriteReady = true;
      injectSidebarIcon();
    } catch(e) { /* no-op — icon is decorative */ }
  }

  function injectSidebarIcon() {
    const slot = document.getElementById('rex-icon-slot');
    if (!slot || !rexSpriteReady) return;
    slot.innerHTML =
      '<svg class="rex-icon" width="32" height="32" viewBox="0 0 752 576"' +
      ' xmlns="http://www.w3.org/2000/svg"><use href="#rex-skull"/></svg>';
  }

  // ── Markdown + syntax highlighting setup ─────────────
  const LANG_ALIAS = {
    js: 'javascript', ts: 'typescript', py: 'python',
    sh: 'bash', shell: 'bash', zsh: 'bash',
    html: 'markup', xml: 'markup', svg: 'markup',
  };

  function escapeHtml(str) {
    return str.replace(/[&<>"']/g, c =>
      ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function guessLanguage(code) {
    if (/^\s*(def |import |from |class |if __name__|async def )/.test(code)) return 'python';
    if (/^\s*(function |const |let |var |=>|import \{)/.test(code))          return 'javascript';
    if (/^\s*(SELECT|INSERT|UPDATE|DELETE|CREATE|ALTER|DROP)/i.test(code))   return 'sql';
    if (/^\s*(<html|<!DOCTYPE|<div|<span|<p )/i.test(code))                  return 'markup';
    if (/^\s*(#!\/bin\/bash|apt |pip |npm |git |cd |ls )/.test(code))        return 'bash';
    if (/^\s*(\{|\[)/.test(code))                                             return 'json';
    return 'text';
  }

  marked.use({
    gfm: true,
    breaks: true,
    renderer: {
      code(args) {
        const isLegacy = typeof args === 'string';
        const text     = isLegacy ? args : (args?.text ?? args?.raw ?? '');
        const lang     = isLegacy ? ''   : (args?.lang ?? '');

        const safeLang   = (typeof lang === 'string' ? lang : '').toLowerCase().trim();
        const normalized = LANG_ALIAS[safeLang] ?? safeLang ?? '';
        const safeText   = typeof text === 'string' ? text : String(text ?? '');
        const finalLang  = normalized || guessLanguage(safeText);
        const grammar    = finalLang && Prism.languages[finalLang];

        let highlighted;
        try {
          highlighted = grammar
            ? Prism.highlight(safeText, grammar, finalLang)
            : escapeHtml(safeText);
        } catch(e) {
          highlighted = escapeHtml(safeText);
        }

        const cls = finalLang ? ` language-${finalLang}` : '';
        return `<pre class="language-${finalLang || 'text'}"><code class="${cls}">${highlighted}</code></pre>`;
      },
    },
  });

  const debounceTimers = new Map();

  function addCopyButtons(el) {
    el.querySelectorAll('pre').forEach(pre => {
      if (pre.querySelector('.copy-btn')) return;
      const code = pre.querySelector('code');
      if (!code) return;
      const btn = document.createElement('button');
      btn.className   = 'copy-btn';
      btn.textContent = 'copy';
      btn.addEventListener('click', () => {
        navigator.clipboard.writeText(code.innerText).then(() => {
          btn.textContent = '✓';
          btn.classList.add('copied');
          setTimeout(() => {
            btn.textContent = 'copy';
            btn.classList.remove('copied');
          }, 1500);
        });
      });
      pre.appendChild(btn);
    });
  }

  function renderMarkdownIntoBubble(wrap) {
    const raw = wrap.dataset.raw || '';
    const md  = wrap.querySelector('.md');
    if (!md || !raw) return;
    try {
      md.innerHTML = marked.parse(raw);
    } catch(e) {
      md.innerHTML = `<pre>${escapeHtml(raw)}</pre>`;
    }
  }

  // ── Server health check ──────────────────────────────
  async function checkHealth() {
    try {
      const res = await fetch(`${API}/health`);
      if (res.ok) {
        document.getElementById("server-status").textContent = "REX online";
        document.getElementById("server-status").className = "server-status online";
        const mRes  = await fetch(`${API}/models`);
        const mData = await mRes.json();
        window.CODE_MODEL      = mData.models.code;
        window.REASONING_MODEL = mData.models.reasoning;
        currentModel           = window.CODE_MODEL;
        document.getElementById("model-label").textContent = currentModel;
        await loadProjects();
      }
    } catch {
      document.getElementById("server-status").textContent = "REX offline";
      document.getElementById("server-status").className = "server-status offline";
      setTimeout(checkHealth, 3000);
    }
  }

  // ── Model toggle ─────────────────────────────────────
  function setModel(type) {
    const isCode = type === "code";
    currentModel = isCode ? window.CODE_MODEL : window.REASONING_MODEL;
    document.getElementById("model-label").textContent = currentModel;
    document.getElementById("btn-code").classList.toggle("active", isCode);
    document.getElementById("btn-reasoning").classList.toggle("active", !isCode);
  }

  // ── Ingest project ───────────────────────────────────
  async function ingestProject() {
    const path   = document.getElementById("project-path").value.trim();
    const status = document.getElementById("ingest-status");
    if (!path) { status.textContent = "Enter a project path."; return; }

    status.textContent = "Indexing... this may take a minute.";
    status.className   = "status-msg";

    try {
      const res  = await fetch(`${API}/ingest`, {
        method:  "POST",
        headers: {"Content-Type": "application/json"},
        body:    JSON.stringify({ project_path: path })
      });
      const data = await res.json();
      if (res.ok) {
        status.textContent = `Done — '${data.project_name}' indexed.`;
        status.className   = "status-msg success";
        document.getElementById("project-name").value = data.project_name;
        await loadProjects();
      } else {
        status.textContent = `Error: ${data.detail}`;
        status.className   = "status-msg error";
      }
    } catch (e) {
      status.textContent = "Could not reach REX server.";
      status.className   = "status-msg error";
    }
  }

  // ── Send query (streaming) ───────────────────────────
  async function sendQuery() {
    if (isLoading) return;

    const question = document.getElementById("question-input").value.trim();
    const project  = document.getElementById("project-name").value.trim();
    const nResults = parseInt(document.getElementById("n-results").value);

    if (!question) return;
    if (!project)  { appendMessage("system", "Set a project name in the sidebar first."); return; }

    appendMessage("user", question);
    document.getElementById("question-input").value = "";
    autoResize(document.getElementById("question-input"));

    isLoading = true;
    document.getElementById("send-btn").disabled = true;

    const bubbleId = appendStreamingBubble();

    try {
      const res = await fetch(`${API}/stream`, {
        method:  "POST",
        headers: {"Content-Type": "application/json"},
        body:    JSON.stringify({
          question,
          project_name: project,
          session_id:   sessionId,
          model:        currentModel,
          n_results:    nResults
        })
      });

      if (!res.ok) {
        const data = await res.json();
        removeStreamingBubble(bubbleId);
        appendMessage("system", `Error: ${data.detail}`);
      } else {
        const reader    = res.body.getReader();
        const decoder   = new TextDecoder();
        let   sseBuffer = "";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          sseBuffer += decoder.decode(value, { stream: true });

          const events = sseBuffer.split(/\r?\n\r?\n/);
          sseBuffer = events.pop() ?? "";

          for (const block of events) {
            const line = block.trim();
            if (!line.startsWith("data: ")) continue;
            const jsonStr = line.slice(6).trim();
            if (!jsonStr || jsonStr === "[DONE]") continue;

            let event;
            try { event = JSON.parse(jsonStr); } catch { continue; }

            if (event.type === "token") {
              appendToStreamingBubble(bubbleId, event.content ?? "");
            } else if (event.type === "done") {
              finalizeStreamingBubble(bubbleId, event.sources);
            } else if (event.type === "error") {
              removeStreamingBubble(bubbleId);
              appendMessage("system", `Error: ${event.detail}`);
            }
          }
        }
      }
    } catch (e) {
      removeStreamingBubble(bubbleId);
      appendMessage("system", "Could not reach REX server.");
    }

    isLoading = false;
    document.getElementById("send-btn").disabled = false;
  }

  // ── Clear session ────────────────────────────────────
  async function clearSession() {
    await fetch(`${API}/session/${sessionId}`, { method: "DELETE" });
    sessionId = crypto.randomUUID();
    const chat = document.getElementById("chat-window");
    chat.innerHTML = `
      <div class="welcome">
        <div class="welcome-title">Ready to explore your codebase.</div>
        <div class="welcome-sub">Set a project name on the left, then start asking.</div>
      </div>`;
  }

  // ── DOM helpers ──────────────────────────────────────
  function appendMessage(role, text, sources = []) {
    const chat = document.getElementById("chat-window");
    const wrap = document.createElement("div");
    wrap.className = `message ${role}`;

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;
    wrap.appendChild(bubble);

    if (sources && sources.length > 0) {
      const src = document.createElement("div");
      src.className = "sources";
      src.innerHTML = "<span class='sources-label'>Sources</span>" +
        sources.map(s =>
          `<span class="source-chip">${s.filepath}:${s.start_line} <em>${s.score}</em></span>`
        ).join("");
      wrap.appendChild(src);
    }

    const welcome = chat.querySelector(".welcome");
    if (welcome) welcome.remove();

    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
  }

  // ── Streaming bubble helpers ─────────────────────────
  function appendStreamingBubble() {
    const chat = document.getElementById("chat-window");
    const id   = "stream-" + Date.now();

    const welcome = chat.querySelector(".welcome");
    if (welcome) welcome.remove();

    // Loader — shown while waiting for first token
    if (rexSpriteReady) {
      const loader = document.createElement("div");
      loader.className = "rex-loader";
      loader.id        = id + "-loader";
      loader.innerHTML =
        '<svg width="64" height="64" viewBox="0 0 752 576"' +
        ' xmlns="http://www.w3.org/2000/svg" aria-hidden="true"' +
        ' style="position:absolute;top:0;left:0;color:var(--accent);opacity:0.12">' +
        '<use href="#rex-skull"/></svg>' +
        '<svg class="rex-loader-draw" width="64" height="64" viewBox="0 0 752 576"' +
        ' xmlns="http://www.w3.org/2000/svg" aria-hidden="true"' +
        ' style="color:var(--accent)"><use href="#rex-skull-outline"/></svg>';
      chat.appendChild(loader);
    }

    const wrap = document.createElement("div");
    wrap.className   = "message assistant";
    wrap.id          = id;
    wrap.dataset.raw = "";

    const bubble = document.createElement("div");
    bubble.className = "bubble";

    const md     = document.createElement("div");
    md.className = "md";
    const cursor = document.createElement("span");
    cursor.className = "stream-cursor";

    bubble.appendChild(md);
    bubble.appendChild(cursor);
    wrap.appendChild(bubble);

    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
    return id;
  }

  function appendToStreamingBubble(id, token) {
    // Fade out and remove loader on first token
    const loader = document.getElementById(id + "-loader");
    if (loader && !loader.classList.contains('hiding')) {
      loader.classList.add('hiding');
      loader.addEventListener('transitionend', () => loader.remove(), { once: true });
    }

    const wrap = document.getElementById(id);
    if (!wrap) return;

    wrap.dataset.raw += token;

    clearTimeout(debounceTimers.get(id));
    debounceTimers.set(id, setTimeout(() => {
      renderMarkdownIntoBubble(wrap);
      document.getElementById("chat-window").scrollTop =
        document.getElementById("chat-window").scrollHeight;
    }, 16));
  }

  function finalizeStreamingBubble(id, sources) {
    document.getElementById(id + "-loader")?.remove();
    const wrap = document.getElementById(id);
    if (!wrap) return;

    clearTimeout(debounceTimers.get(id));
    debounceTimers.delete(id);

    renderMarkdownIntoBubble(wrap);

    const bubble = wrap.querySelector(".bubble");
    addCopyButtons(bubble.querySelector(".md"));
    bubble.querySelector(".stream-cursor")?.remove();

    if (sources && sources.length > 0) {
      const src = document.createElement("div");
      src.className = "sources";
      src.innerHTML = "<span class='sources-label'>Sources</span>" +
        sources.map(s =>
          `<span class="source-chip">${s.filepath}:${s.start_line} <em>${s.score}</em></span>`
        ).join("");
      wrap.appendChild(src);
    }

    document.getElementById("chat-window").scrollTop =
      document.getElementById("chat-window").scrollHeight;
  }

  function removeStreamingBubble(id) {
    document.getElementById(id + "-loader")?.remove();
    clearTimeout(debounceTimers.get(id));
    debounceTimers.delete(id);
    document.getElementById(id)?.remove();
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendQuery();
    }
  }

  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 160) + "px";
  }

  // ── Accent colour ────────────────────────────────────
  function hexToHsl(hex) {
    let r = parseInt(hex.slice(1,3),16)/255;
    let g = parseInt(hex.slice(3,5),16)/255;
    let b = parseInt(hex.slice(5,7),16)/255;
    const max = Math.max(r,g,b), min = Math.min(r,g,b);
    let h = 0, s = 0, l = (max+min)/2;
    if (max !== min) {
      const d = max - min;
      s = l > 0.5 ? d/(2-max-min) : d/(max+min);
      switch(max) {
        case r: h = ((g-b)/d + (g<b?6:0))/6; break;
        case g: h = ((b-r)/d + 2)/6; break;
        case b: h = ((r-g)/d + 4)/6; break;
      }
    }
    return [h*360, s*100, l*100];
  }

  function hslToHex(h, s, l) {
    s /= 100; l /= 100;
    const a = s * Math.min(l, 1-l);
    const f = n => {
      const k = (n + h/30) % 12;
      return Math.round(255*(l - a*Math.max(Math.min(k-3,9-k,1),-1)))
        .toString(16).padStart(2,'0');
    };
    return `#${f(0)}${f(8)}${f(4)}`;
  }

  function updateAccent(hex) {
    const [h, s, l] = hexToHsl(hex);
    const dimHex = hslToHex(h, s, Math.max(5, l * 0.62));
    document.documentElement.style.setProperty('--accent', hex);
    document.documentElement.style.setProperty('--accent-dim', dimHex);
    document.getElementById('accent-picker').value = hex;
    document.getElementById('dim-swatch').style.background = dimHex;
    document.getElementById('dim-hex').textContent = `dim → ${dimHex}`;
    localStorage.setItem('rex-accent', hex);
  }

  updateAccent(localStorage.getItem('rex-accent') || '#c8ff00');
  checkHealth();
  initRexSprite();

  // ── Project filterable dropdown ───────────────────────
  let allProjects    = [];
  let suggestionIdx  = -1;

  async function loadProjects() {
    try {
      const res = await fetch(`${API}/projects`);
      if (res.ok) {
        const data = await res.json();
        allProjects = data.projects || [];
      }
    } catch { /* server offline — no-op */ }
  }

  function renderSuggestions(filter) {
    const list     = document.getElementById('project-suggestions');
    const filtered = (filter && filter.trim())
      ? allProjects.filter(p => p.toLowerCase().includes(filter.toLowerCase()))
      : allProjects;

    if (filtered.length === 0) {
      list.innerHTML = '<li class="suggestion-item suggestion-empty">No results</li>';
      list.hidden = false;
      document.getElementById('project-dropdown').classList.add('open');
      return;
    }

    list.innerHTML = filtered.map(p =>
      `<li class="suggestion-item" data-name="${p}">${p}</li>`
    ).join('');

    list.querySelectorAll('.suggestion-item').forEach(li => {
      li.addEventListener('mousedown', e => {
        e.preventDefault(); // keep input focus until we choose
        selectProject(li.dataset.name);
      });
    });

    suggestionIdx = -1;
    list.hidden = false;
    document.getElementById('project-dropdown').classList.add('open');
  }

  function selectProject(name) {
    document.getElementById('project-name').value = name;
    document.getElementById('project-suggestions').hidden = true;
    document.getElementById('project-dropdown').classList.remove('open');
    suggestionIdx = -1;
  }

  function closeSuggestions() {
    document.getElementById('project-suggestions').hidden = true;
    document.getElementById('project-dropdown').classList.remove('open');
    suggestionIdx = -1;
  }

  // Wire up input events
  (function () {
    const input = document.getElementById('project-name');
    const list  = document.getElementById('project-suggestions');

    input.addEventListener('focus', () => {
      if (allProjects.length > 0) renderSuggestions(input.value);
    });

    input.addEventListener('input', () => {
      renderSuggestions(input.value);
    });

    input.addEventListener('keydown', e => {
      if (list.hidden) return;
      const items = list.querySelectorAll('.suggestion-item');
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        suggestionIdx = Math.min(suggestionIdx + 1, items.length - 1);
        items.forEach((el, i) => el.classList.toggle('active', i === suggestionIdx));
        items[suggestionIdx]?.scrollIntoView({ block: 'nearest' });
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        suggestionIdx = Math.max(suggestionIdx - 1, -1);
        items.forEach((el, i) => el.classList.toggle('active', i === suggestionIdx));
        if (suggestionIdx >= 0) items[suggestionIdx]?.scrollIntoView({ block: 'nearest' });
      } else if (e.key === 'Enter') {
        if (suggestionIdx >= 0 && items[suggestionIdx]) {
          e.preventDefault();
          selectProject(items[suggestionIdx].dataset.name);
        }
      } else if (e.key === 'Escape') {
        closeSuggestions();
      }
    });

    input.addEventListener('blur', () => {
      // Delay so mousedown on a suggestion fires before blur hides the list
      setTimeout(closeSuggestions, 150);
    });
  })();

  // Close on click outside the dropdown
  document.addEventListener('click', e => {
    if (!document.getElementById('project-dropdown').contains(e.target)) {
      closeSuggestions();
    }
  });
</script>
</body>
