services:

  ollama:
    image: ollama/ollama:latest
    container_name: rex-ollama
    ports:
      - "11434:11434"
    volumes:
      - ${HOME}/.ollama:/root/.ollama
    # Requires NVIDIA GPU + nvidia-container-toolkit.
    # CPU fallback: remove this entire 'deploy' block (expect slower inference).
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama:latest
    container_name: rex-ollama-init
    depends_on:
      - ollama
    volumes:
      - ${HOME}/.ollama:/root/.ollama
    entrypoint: >
      sh -c "
        sleep 5 &&
        ollama pull nomic-embed-text &&
        ollama pull qwen2.5-coder:7b &&
        ollama pull qwen3.5:9b
      "
    environment:
      - OLLAMA_HOST=http://ollama:11434
    restart: "no"

  rex:
    build: .
    container_name: rex-api
    ports:
      - "8000:8000"
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
      # Optional cloud provider keys — copy .env.example to .env and uncomment:
      # - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # - GROQ_API_KEY=${GROQ_API_KEY}
      # - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      # Persist sessions and vector store outside the container
      - rex-data:/root/.rex
    restart: unless-stopped

volumes:
  rex-data:
